<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="play" x1="0" y1="0" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e0e7ff"/>
    </linearGradient>
  </defs>
  <!-- Rounded square base -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Film strip notch top -->
  <rect x="80" y="56" width="32" height="20" rx="4" fill="#ffffff" opacity="0.25"/>
  <rect x="136" y="56" width="32" height="20" rx="4" fill="#ffffff" opacity="0.25"/>
  <rect x="192" y="56" width="32" height="20" rx="4" fill="#ffffff" opacity="0.25"/>
  <!-- Film strip notch bottom -->
  <rect x="288" y="436" width="32" height="20" rx="4" fill="#ffffff" opacity="0.25"/>
  <rect x="344" y="436" width="32" height="20" rx="4" fill="#ffffff" opacity="0.25"/>
  <rect x="400" y="436" width="32" height="20" rx="4" fill="#ffffff" opacity="0.25"/>
  <!-- AI sparkle (small diamond) -->
  <path d="M400 120 L410 140 L400 160 L390 140 Z" fill="#fbbf24" opacity="0.9"/>
  <path d="M370 100 L376 112 L370 124 L364 112 Z" fill="#fbbf24" opacity="0.6"/>
  <!-- Play triangle -->
  <polygon points="200,148 368,256 200,364" fill="url(#play)"/>
</svg>
